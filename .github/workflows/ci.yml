name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: social-recipes-app:latest
          cache-from: type=gha,scope=app-image
          cache-to: type=gha,mode=max,scope=app-image

      - name: Run RuboCop
        run: docker compose run --rm app bash -lc "bundle exec rubocop --lint --force-exclusion app config db lib spec"

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: social-recipes-app:latest
          cache-from: type=gha,scope=app-image
          cache-to: type=gha,mode=max,scope=app-image

      - name: Run test suite
        env:
          CLOUDINARY_CLOUD_NAME: test-cloud
          CLOUDINARY_API_KEY: test-key
          CLOUDINARY_API_SECRET: test-secret
        run: docker compose run --rm -e RAILS_ENV=test app bash -lc "bundle exec rails db:environment:set RAILS_ENV=test && bundle exec rake db:create db:schema:load && bundle exec rspec"
